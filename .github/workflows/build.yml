name: Build Release Packages

on:
  push:
    branches:
      - 'ci-**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'ci-**'

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patching
        run: |
          sed -i '' 's/^productName: Chatbox$/productName: Chatbox-Querit/' electron-builder.yml
          cat > .erb/scripts/notarize.js << 'EOF'
          import { execSync } from 'child_process'
          import path from 'path'

          export default async function signAdHoc(context) {
              if (context.electronPlatformName !== 'darwin') return
              const appPath = path.join(context.appOutDir, `${context.packager.appInfo.productFilename}.app`)
              execSync(`codesign --force --deep --sign - "${appPath}"`)
          }
          EOF
          cat > .erb/scripts/delete-source-maps-runner.js << 'EOF'
          import deleteSourceMaps from './delete-source-maps';
          deleteSourceMaps();
          EOF
          jq '.dependencies.epub = "2.1.1"' package.json > package.json.tmp && mv package.json.tmp package.json
          jq '.dependencies["adm-zip"] = "^0.5.16"' package.json > package.json.tmp && mv package.json.tmp package.json
          jq '.dependencies["adm-zip"] = "^0.5.16"' release/app/package.json > release/app/package.json.tmp && mv release/app/package.json.tmp release/app/package.json
          jq '.pnpm.onlyBuiltDependencies += ["7zip-bin"]' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and package application (macOS)
        run: pnpm run package -- --mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-macos
          path: |
            release/build/*.dmg
          if-no-files-found: ignore
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patching
        shell: pwsh
        run: |
          $content = Get-Content electron-builder.yml -Raw
          $content = $content -replace '^productName: Chatbox$', 'productName: Chatbox-Querit'
          $content = $content -replace '  sign: \./custom_win_sign\.js\r?\n', ''
          $content = $content -replace '  signingHashAlgorithms:\r?\n    - sha256\r?\n', ''
          Set-Content electron-builder.yml -Value $content -NoNewline

          @'
          import deleteSourceMaps from './delete-source-maps';
          deleteSourceMaps();
          '@ | Set-Content .erb/scripts/delete-source-maps-runner.js -NoNewline

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.dependencies.epub = "2.1.1"
          $pkg.dependencies | Add-Member -NotePropertyName "adm-zip" -NotePropertyValue "^0.5.16" -Force
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json -NoNewline

          $releasePkg = Get-Content release/app/package.json -Raw | ConvertFrom-Json
          $releasePkg.dependencies | Add-Member -NotePropertyName "adm-zip" -NotePropertyValue "^0.5.16" -Force
          $releasePkg | ConvertTo-Json -Depth 100 | Set-Content release/app/package.json -NoNewline

          $pkg2 = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg2.pnpm.onlyBuiltDependencies += "7zip-bin"
          $pkg2 | ConvertTo-Json -Depth 100 | Set-Content package.json -NoNewline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and package application (Windows)
        run: pnpm run package -- --win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-windows
          path: |
            release/build/*.exe
            release/build/*.msi
          if-no-files-found: ignore
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patching
        run: |
          sed -i 's/^productName: Chatbox$/productName: Chatbox-Querit/' electron-builder.yml
          jq '.dependencies.epub = "2.1.1"' package.json > package.json.tmp && mv package.json.tmp package.json
          jq '.dependencies["adm-zip"] = "^0.5.16"' package.json > package.json.tmp && mv package.json.tmp package.json
          jq '.dependencies["adm-zip"] = "^0.5.16"' release/app/package.json > release/app/package.json.tmp && mv release/app/package.json.tmp release/app/package.json
          jq '.pnpm.onlyBuiltDependencies += ["7zip-bin"]' package.json > package.json.tmp && mv package.json.tmp package.json
          cat > .erb/scripts/delete-source-maps-runner.js << 'EOF'
          import deleteSourceMaps from './delete-source-maps';
          deleteSourceMaps();
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Dereference 7zip-bin symlink
        run: |
          cp -rL node_modules/7zip-bin /tmp/7zip-bin-real
          rm -rf node_modules/7zip-bin
          mv /tmp/7zip-bin-real node_modules/7zip-bin
          chmod +x node_modules/7zip-bin/linux/x64/7za
          echo "7za is now a real file:"
          ls -la node_modules/7zip-bin/linux/x64/7za

      - name: Build and package application (Linux)
        run: pnpm run package -- --linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-linux
          path: |
            release/build/*.AppImage
            release/build/*.deb
            release/build/*.rpm
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      (always() && !cancelled() && !failure())
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/chatbox-macos/*
            artifacts/chatbox-windows/*
            artifacts/chatbox-linux/*
          draft: false
          prerelease: false
          generate_release_notes: true
